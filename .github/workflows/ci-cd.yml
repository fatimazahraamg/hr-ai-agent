name: CI/CD - HR AI Agent

on:
  push:
    branches: [main]

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installer les dépendances
        run: pip install -r requirements.txt pytest httpx

      - name: Lancer les tests
        run: pytest tests/ -v

  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image Docker
        run: docker build -t hr-ai-agent:latest .

  deploy:
    name: 🚀 Déploiement
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Redémarrer l'application
        run: |
          docker-compose down
          docker-compose up -d --build
          echo "✅ Application déployée !"